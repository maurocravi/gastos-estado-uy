# Diagnóstico temporal: ¿el BCU responde desde los runners de GitHub?
name: test-bcu
on: workflow_dispatch
jobs:
  curl:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sv -o /dev/null --max-time 20 'https://cotizaciones.bcu.gub.uy/wscotizaciones/servlet/awsbcucotizaciones?wsdl' 2>&1 | grep -E 'Trying|Connected|HTTP|timed out|refused' || true
          echo "---"
          curl -s -o /dev/null -w 'HTTP %{http_code} en %{time_total}s\n' --max-time 20 'https://cotizaciones.bcu.gub.uy/wscotizaciones/servlet/awsbcucotizaciones?wsdl' || echo "FALLO: exit $?"
